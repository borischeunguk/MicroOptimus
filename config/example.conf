# MicroOptimus Configuration Example

[orderbook]
# Maximum number of price levels to maintain
max_price_levels = 1000
# Enable detailed logging
verbose_logging = false

[matchengine]
# Enable trade notifications
notify_trades = true
# Enable order update notifications
notify_order_updates = true

[marketdata]
# Market data feed URL
feed_url = ws://localhost:8080/marketdata
# Reconnect interval (seconds)
reconnect_interval = 5
# Symbols to subscribe
symbols = BTCUSD,ETHUSD,SOLUSD

[exchange]
# Exchange session ID
session_id = MAIN_SESSION
# FIX protocol settings (if using FIX)
fix_host = localhost
fix_port = 9878
fix_sender_comp_id = MICROOPTIMUS
fix_target_comp_id = EXCHANGE

[gateway]
# Order submission timeout (milliseconds)
order_timeout = 5000
# Enable order validation
validate_orders = true

[marketmaker]
# Trading symbol
symbol = BTCUSD
# Spread in basis points (10 bps = 0.1%)
spread_bps = 10.0
# Quote size
quote_size = 100
# Maximum position
max_position = 1000
# Maximum loss
max_loss = 10000.0
# Inventory skew factor (0-1)
skew_factor = 0.1

[risk]
# Maximum order size
max_order_size = 500
# Maximum daily loss
max_daily_loss = 50000.0
# Position limits per symbol
position_limits = 2000

[logging]
# Log level: DEBUG, INFO, WARNING, ERROR, CRITICAL
level = INFO
# Log file path
file = logs/microoptimus.log
# Enable console logging
console = true
